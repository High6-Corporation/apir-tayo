name: Deploy to Hostinger VPS

on:
  push:
    branches:
      - staging

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Deploy Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_KEY }}" > ~/.ssh/apirtayo_repo_key
          chmod 600 ~/.ssh/apirtayo_repo_key
          ssh-keyscan github.com >> ~/.ssh/known_hosts

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          timeout: 60s
          command_timeout: 15m
          script: |
            set -e
            cd /home/projects/apirtayo
            GIT_SSH_COMMAND="ssh -i ~/.ssh/apirtayo_repo_key -o StrictHostKeyChecking=no" git pull git@github.com:High6-Corporation/apir-tayo.git master
            npm ci
            npm run build
            sudo -u appuserwebsite pm2 reload apirtayo --update-env